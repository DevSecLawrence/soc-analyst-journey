title: PowerShell Credential Harvesting via Registry
id: d4e5f6a7-b8c9-0123-defa-234567890123
status: experimental
description: Detects PowerShell accessing the Winlogon registry key for DefaultPassword — indicates autologon credential theft
author: Lawrence (DevSecLawrence)
date: 2026-06-27
references:
    - https://attack.mitre.org/techniques/T1552/002/
logsource:
    category: ps_script
    product: windows
    definition: Script block logging must be enabled (Event ID 4104)
detection:
    selection:
        ScriptBlockText|contains:
            - 'Winlogon'
            - 'DefaultPassword'
            - 'SecureStringToBSTR'
            - 'PtrToStringAuto'
    condition: selection
falsepositives:
    - System administrators auditing autologon configuration
    - Legitimate password management tools
level: high
tags:
    - attack.credential_access
    - attack.t1552.002
    - attack.t1555

