title: Lateral Movement via WMI Remote Execution
id: d40-002
status: experimental
description: Detects suspicious process creation via WmiPrvSE.exe — indicator of WMI-based remote execution
references:
    - https://attack.mitre.org/techniques/T1047/
author: Lawrence
date: 2026-06-21
tags:
    - attack.lateral_movement
    - attack.execution
    - attack.t1047
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        ParentImage|endswith: '\WmiPrvSE.exe'
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
    condition: selection
falsepositives:
    - Some legitimate management software uses WMI for remote execution
    - SCCM and endpoint management platforms
level: high
fields:
    - Image
    - ParentImage
    - CommandLine
    - User
