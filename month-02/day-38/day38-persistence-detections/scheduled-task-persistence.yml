title: Suspicious Scheduled Task Persistence
id: 1d1f3e95-8c9d-4d1c-9b4d-38a1a0a00002
status: experimental
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith:
      - '\\schtasks.exe'
    CommandLine|contains:
      - '/create'
  condition: selection
fields:
  - Image
  - CommandLine
  - ParentImage
falsepositives:
  - Legitimate admin automation and deployment tools
level: medium