title: Certutil File Download from URL
id: f1a2b3c4-d5e6-7890-abcd-ef1234567891
status: experimental
description: Detects certutil.exe being used to download files from URLs — common malware staging technique
author: Lawrence (DevSecLawrence)
date: 2026-06-28
references:
    - https://attack.mitre.org/techniques/T1105/
    - https://lolbas-project.github.io/lolbas/Binaries/Certutil/
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\certutil.exe'
        CommandLine|contains:
            - '-urlcache'
            - '-split'
    filter_legitimate:
            CommandLine|contains:
            - '.crl'
            - '.cer'
            - '.crt'
            - 'pki.microsoft.com'
            - 'ctldl.windowsupdate.com'
    condition: selection and not filter_legitimate
falsepositives:
    - IT admins downloading certificates from internal PKI infrastructure
    - Software deployment scripts using certutil for cert distribution
level: high
tags:
    - attack.command_and_control
    - attack.t1105
    - attack.defense_evasion
