title: WMIC Remote Process Creation
id: c4d5e6f7-a8b9-0123-defa-234567890124
status: experimental
description: Detects wmic.exe being used to create processes locally or on remote systems — common for lateral movement and parent process obfuscation
author: Lawrence (DevSecLawrence)
date: 2026-06-28
references:
    - https://attack.mitre.org/techniques/T1047/
    - https://lolbas-project.github.io/lolbas/Binaries/Wmic/
logsource:
    category: process_creation
    product: windows
detection:
    selection_create:
        Image|endswith: '\wmic.exe'
        CommandLine|contains: 'process'
        CommandLine|contains: 'call'
        CommandLine|contains: 'create'
    selection_remote:
        Image|endswith: '\wmic.exe'
        CommandLine|contains: '/node:'
    condition: selection_create or selection_remote
falsepositives:
    - Legitimate IT admin scripts using wmic for remote management
    - Software deployment tools using wmic for process management
    - Monitoring agents that query wmic
level: medium
tags:
    - attack.execution
    - attack.t1047
    - attack.lateral_movement
    
