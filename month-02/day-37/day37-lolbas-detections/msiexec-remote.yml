title: Msiexec Remote Package Installation or DLL Execution
id: d5e6f7a8-b9c0-1234-efab-345678901235
status: experimental
description: Detects msiexec.exe installing packages from remote URLs or executing DLLs via /y or /z flags
author: Lawrence (DevSecLawrence)
date: 2026-06-28
references:
    - https://attack.mitre.org/techniques/T1218/007/
    - https://lolbas-project.github.io/lolbas/Binaries/Msiexec/
logsource:
    category: process_creation
    product: windows
detection:
    selection_url:
        Image|endswith: '\msiexec.exe'
        CommandLine|contains:
            - 'http://'
            - 'https://'
            - 'ftp://'
    selection_dll:
        Image|endswith: '\msiexec.exe'
        CommandLine|contains:
            - ' /y '
            - ' /z '
    condition: selection_url or selection_dll
falsepositives:
    - Software deployments installing packages from internal HTTP distribution points
    - SCCM or Intune software deployment
    - Legitimate software using msiexec with internal URLs
level: medium
tags:
    - attack.defense_evasion
    - attack.t1218.007
    - attack.execution