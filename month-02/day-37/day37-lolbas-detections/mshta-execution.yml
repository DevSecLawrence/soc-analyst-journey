title: Mshta Executing Remote Script or Inline Code
id: a2b3c4d5-e6f7-8901-bcde-f12345678902
status: experimental
description: Detects mshta.exe executing code from a URL or inline script — used for proxy execution and bypass of application whitelisting
author: Lawrence (DevSecLawrence)
date: 2026-06-28
references:
    - https://attack.mitre.org/techniques/T1218/005/
    - https://lolbas-project.github.io/lolbas/Binaries/Mshta/
logsource:
    category: process_creation
    product: windows
detection:
    selection_url:
        Image|endswith: '\mshta.exe'
        CommandLine|contains:
            - 'http://'
            - 'https://'
            - 'ftp://'
    selection_inline:
        Image|endswith: '\mshta.exe'
        CommandLine|contains:
            - 'vbscript:'
            - 'javascript:'
    condition: selection_url or selection_inline
falsepositives:
    - Legacy enterprise applications using .hta files from internal servers
    - Known internal HTA-based admin tools
level: high
tags:
    - attack.defense_evasion
    - attack.t1218.005
    - attack.execution